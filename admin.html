<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Portafolio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .admin-card {
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }

        .hidden {
            display: none !important;
        }

        #dashboard-section {
            max-width: 800px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-family: var(--font-main);
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        
        .success-msg {
            color: var(--accent-color);
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sección de Login -->
        <div id="login-section" class="admin-card glass">
            <h2 style="margin-bottom: 20px; text-align: center;">Acceso Privado</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="admin-email" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="admin-password" required>
                </div>
                <button type="submit" class="btn primary-btn" style="width: 100%">Entrar</button>
                <p id="login-error" class="error-msg"></p>
            </form>
            <div style="text-align: center; margin-top: 20px;">
                <a href="index.html" class="btn-text">&larr; Volver al Portafolio</a>
            </div>
        </div>

        <!-- Sección de Dashboard (Agregar Proyectos) -->
        <div id="dashboard-section" class="admin-card glass hidden">
            <h2 style="margin-bottom: 20px; text-align: center;">Añadir Nuevo Proyecto</h2>
            <form id="add-project-form">
                <div class="form-group">
                    <label>Título del Proyecto</label>
                    <input type="text" id="proj-title" required>
                </div>
                <div class="form-group">
                    <label>Descripción Corta</label>
                    <textarea id="proj-desc" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Tecnologías (separadas por coma, ej: Kotlin, MVVM)</label>
                    <input type="text" id="proj-tech" required>
                </div>
                <div class="form-group">
                    <label>URL de Imagen o Color Hexadecimal (ej: #4285f4)</label>
                    <input type="text" id="proj-img" placeholder="URL o #Color" required>
                </div>
                <div class="form-group">
                    <label>Enlace de GitHub o Detalles</label>
                    <input type="url" id="proj-link" required>
                </div>
                <button type="submit" class="btn primary-btn" style="width: 100%">Guardar Proyecto</button>
                <p id="project-msg"></p>
            </form>
            <div style="text-align: center; margin-top: 20px;">
                <button id="logout-btn" class="btn secondary-btn">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
